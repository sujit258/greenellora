<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 196" fill="none">

  <!-- ===== LEAVES ===== -->

  <!-- Top center leaf -->
  <ellipse cx="130" cy="11" rx="8" ry="14" fill="#2d5016"/>

  <!-- 2nd tier -->
  <ellipse cx="109" cy="22" rx="8" ry="13" transform="rotate(-22 109 22)" fill="#2d5016"/>
  <ellipse cx="151" cy="22" rx="8" ry="13" transform="rotate(22 151 22)" fill="#2d5016"/>

  <!-- 3rd tier -->
  <ellipse cx="87" cy="43" rx="8" ry="14" transform="rotate(-45 87 43)" fill="#2d5016"/>
  <ellipse cx="173" cy="43" rx="8" ry="14" transform="rotate(45 173 43)" fill="#2d5016"/>

  <!-- 4th tier -->
  <ellipse cx="63" cy="70" rx="9" ry="16" transform="rotate(-62 63 70)" fill="#2d5016"/>
  <ellipse cx="197" cy="70" rx="9" ry="16" transform="rotate(62 197 70)" fill="#2d5016"/>

  <!-- 5th tier (widest) -->
  <ellipse cx="44" cy="102" rx="9" ry="16" transform="rotate(-74 44 102)" fill="#2d5016"/>
  <ellipse cx="216" cy="102" rx="9" ry="16" transform="rotate(74 216 102)" fill="#2d5016"/>

  <!-- ===== TRUNK ===== -->
  <rect x="127" y="44" width="6" height="112" rx="3" fill="#2d5016"/>

  <!-- ===== BRANCHES ===== -->
  <!-- 3rd tier -->
  <line x1="130" y1="63" x2="87" y2="53" stroke="#2d5016" stroke-width="5" stroke-linecap="round"/>
  <line x1="130" y1="63" x2="173" y2="53" stroke="#2d5016" stroke-width="5" stroke-linecap="round"/>

  <!-- 4th tier -->
  <line x1="130" y1="78" x2="63" y2="80" stroke="#2d5016" stroke-width="5" stroke-linecap="round"/>
  <line x1="130" y1="78" x2="197" y2="80" stroke="#2d5016" stroke-width="5" stroke-linecap="round"/>

  <!-- 5th tier -->
  <line x1="130" y1="95" x2="44" y2="112" stroke="#2d5016" stroke-width="4" stroke-linecap="round"/>
  <line x1="130" y1="95" x2="216" y2="112" stroke="#2d5016" stroke-width="4" stroke-linecap="round"/>

  <!-- ===== G LETTER ===== -->
  <text x="76" y="175"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="66"
        fill="#2d5016">G</text>

  <!-- ===== e LETTER ===== -->
  <text x="131" y="175"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="66"
        fill="#2d5016">e</text>

  <!-- ===== BASE LINE ===== -->
  <rect x="58" y="182" width="144" height="4.5" rx="2.25" fill="#2d5016"/>

</svg>
